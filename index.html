<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Modelo Dashboard</title>
</head>

<body>

    <div class="container">

        <h1>Título do Dashboard</h1>


        <div class="analyse">

            <div class="sales">

                <h3>KPI 1</h3>
                <h1 id="qtd_mov">0</h1>

            </div>

            <div class="visits">

                <h3>KPI 2</h3>
                <h1 id="valor_entrada">0</h1>

            </div>

            <div class="searches">

                <h3>KPI 3</h3>
                <h1 id="valor_saida">0</h1>

            </div>

            <div class="searches">

                <h3>KPI 4</h3>
                <h1 id="saldo">0</h1>

            </div>

            <div class="searches">

                <h3>KPI 5</h3>
                <h1 id="kpi5">0</h1>

            </div>
        </div>


        <div class="charts-container">

            <div class="first-line">

                <div class="chart_card">

                    <h3>Gráfico 1</h3>

                    <div id="pie" style="width: 100%; height: 100%;"></div>


                </div>

                <div class="chart_card">

                    <h3>Gráfico 2</h3>

                    <div id="bar_saida" style="width: 100%; height: 100%;"></div>


                </div>

                <div class="chart_card line-chart">

                    <h3>Gráfico 3</h3>

                    <div id="line" style="width: 100%; height: 100%;"></div>
                    

                </div>


            </div>


            <div class="second-line">


                <div class="chart_card">

                    <h3>Gráfico 4</h3>


                </div>

            </div>

        </div>

    </div>

</body>
